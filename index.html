<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MC Server Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>Minecraft Server Monitor</h1>
  </header>

  <div class="control-panel">
    <select id="edition">
      <option value="java">Java Edition</option>
      <option value="bedrock">Bedrock Edition</option>
    </select>

    <input type="text" id="serverInput" placeholder="example.com または IP">
    <button onclick="addServer()">追加</button>
  </div>

  <section>
    <h2>お気に入り</h2>
    <div id="favorites" class="server-grid"></div>
  </section>

  <section>
    <h2>検索履歴</h2>
    <div id="history" class="server-grid"></div>
  </section>

  <section>
    <h2>サーバー一覧</h2>
    <div id="serverList" class="server-grid"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
